name: 🐛 Bug Report
description: Melde einen Fehler in der Fitness App
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Danke fürs Melden! Bitte fülle alle Felder so genau wie möglich aus.
  - type: textarea
    id: description
    attributes:
      label: Beschreibung
      description: Was ist passiert?
      placeholder: Beschreibe den Fehler genau...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Schritte zur Reproduktion
      description: Wie kann man den Fehler reproduzieren?
      placeholder: |
        1. Gehe zu '...'
        2. Klicke auf '...'
        3. Sieh Fehler
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
      description: Was hättest du erwartet?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Falls vorhanden, füge Screenshots oder Fehlerlogs ein.
  - type: dropdown
    id: severity
    attributes:
      label: Schweregrad
      options:
        - Kritisch (App nicht nutzbar)
        - Hoch (wichtige Funktion defekt)
        - Mittel (Workaround möglich)
        - Niedrig (Schönheitsfehler)
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Umgebung
      placeholder: "Browser/OS, z.B. Chrome 122 / Windows 11"
