name: 🚀 Feature Request
description: Schlage eine neue Funktion vor
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Welches Problem soll diese Funktion lösen?
      placeholder: "Als Nutzer möchte ich..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Vorgeschlagene Lösung
      description: Wie stellst du dir die Umsetzung vor?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativen
      description: Hast du andere Möglichkeiten in Betracht gezogen?
  - type: dropdown
    id: priority
    attributes:
      label: Priorität
      options:
        - Hoch
        - Mittel
        - Niedrig
    validations:
      required: true
